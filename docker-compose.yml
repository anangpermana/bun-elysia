#name: elysia-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: elysia_app
    restart: always
    # ports:
    #   - "${PORT:-3000}:3000"
    # Tidak ada port mapping & container_name supaya bisa replicas
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-appdb}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    env_file:
      - .env
    deploy:
      replicas: 2  # sesuaikan dengan jumlah core
    networks:
      - monitoring
  db:
    image: postgres:16-alpine
    container_name: elysia_db
    restart: always
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - monitoring

volumes:
  postgres_data:

networks:
  monitoring:
    driver: bridge
