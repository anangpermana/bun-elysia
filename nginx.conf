events {
  worker_connections 1024;
}

http {
  upstream elysia {
    least_conn;  # kirim ke instance yang paling sedikit load
    server app:3000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://elysia;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}